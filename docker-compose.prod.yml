# Production deployment — VPS
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - default
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: nexus_core
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_core"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fomo-core:local
    restart: unless-stopped
    networks:
      - default
      - fomo-network
      - dokploy-network
    ports:
      - "3002:3002"
    env_file:
      - path: .env
        required: false
    environment:
      # Database & Redis
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_core?schema=public
      REDIS_URL: redis://redis:6379
      # Server
      PORT: 3002
      HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      FILE_STORAGE_PATH: /app/data/files
      # Security
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-}
      API_KEY_SECRET: ${API_KEY_SECRET:-}
      WEBHOOK_SIGNING_KEY: ${WEBHOOK_SIGNING_KEY:-}
      OPENCLAW_INTERNAL_KEY: ${OPENCLAW_INTERNAL_KEY:-}
      # LLM Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Messaging
      NEXUS_API_KEY: ${NEXUS_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      # Provisioning
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_API_VERSION: "1.43"
      FOMO_CORE_API_URL: ${FOMO_CORE_API_URL:-https://api.fomo.com.ar}
      PROVISIONING_PORT_RANGE_START: "19000"
      PROVISIONING_PORT_RANGE_END: "19999"
      CLIENT_TEMPLATES_PATH: /app/templates
    volumes:
      - filedata:/app/data/files
      - /var/run/docker.sock:/var/run/docker.sock
      - ./templates:/app/templates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-fomo-core}_default
  fomo-network:
    name: fomo-network
    driver: bridge
  dokploy-network:
    external: true

volumes:
  pgdata:
  redisdata:
  filedata:
