services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_core
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_core"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_core?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3002
      HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      FILE_STORAGE_PATH: /app/data/files
      WAHA_DEFAULT_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-nexus}
    volumes:
      - filedata:/app/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  waha:
    image: devlikeapro/waha
    container_name: nexus-waha
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_PRINT_QR: "True"
      WHATSAPP_RESTART_ALL_SESSIONS: "True"
      WAHA_API_KEY: ${WAHA_API_KEY:-nexus}
    volumes:
      - wahadata:/app/.sessions

volumes:
  pgdata:
  filedata:
  wahadata:
